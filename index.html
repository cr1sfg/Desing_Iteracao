<!doctype html>
<html lang="pt-BR" class="h-full">
  <head>
    <script src="/_sdk/telemetry_sdk.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Footfute Brasil</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="/_sdk/element_sdk.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&amp;family=Barlow:wght@300;400;600&amp;display=swap"
      rel="stylesheet"
    />
    <script
      src="https://t.contentsquare.net/uxa/8f04593b42a1b.js"
      defer
    ></script>
    <link rel="stylesheet" href="./css/index.css" />
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  </head>

  <body
    class="h-full w-full overflow-hidden"
    style="
      background-color: #0d1b2a;
      font-family: &quot;Barlow&quot;, sans-serif;
    "
  >
    <div class="w-full min-h-full flex flex-col items-center px-4 py-8">
      <!-- Header -->
      <header
        class="text-center mb-8 animate-in flex flex-col items-center"
        style="animation-delay: 0.1s"
      >
        <div class="flex items-center gap-3 justify-center mb-1">
          <span class="h-px w-12 sm:w-24" style="background: #d7ff00"></span>
          <h1
            id="championshipName"
            class="font-bold text-3xl sm:text-4xl tracking-wider uppercase"
            style="font-family: &quot;Oswald&quot;, sans-serif; color: #fff"
          >
            Brasileirão
          </h1>
          <i
            data-lucide="trophy"
            class="w-6 h-6 sm:w-8 sm:h-8"
            style="color: #d7ff00"
          ></i>
          <span class="h-px w-12 sm:w-24" style="background: #d7ff00"></span>
        </div>
        <p id="subtitle" class="mt-2 text-lg" style="color: #8899aa">
          Escolha seu clube para gerenciar no Brasileirão
        </p>
      </header>
      <div
        class="w-full max-w-md mb-6 animate-in"
        style="animation-delay: 0.2s"
      >
        <div class="relative">
          <i
            data-lucide="search"
            class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-3"
            style="color: #8899aa"
          ></i>
          <input
            id="search"
            type="text"
            placeholder="Buscar time..."
            class="w-full pl-10 pr-4 py-3 rounded-lg text-sm focus:outline-none focus:ring-2"
            style="
              background: #1b2838;
              color: #fff;
              border: 1px solid #2a3f55;
              --tw-ring-color: #d7ff00;
            "
          />
        </div>
      </div>
      <div
        id="teams-grid"
        class="w-full max-w-5xl grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 mb-8"
      ></div>
      <div id="confirm-section" class="hidden animate-in mb-8">
        <button
          id="confirm-btn"
          class="px-8 py-3 rounded-lg font-semibold text-base transition-all hover:scale-105"
          style="
            background: #d7ff00;
            color: #0d1b2a;
            font-family: &quot;Oswald&quot;, sans-serif;
          "
        >
          CONFIRMAR ESCOLHA
        </button>
      </div>
      <div
        id="modal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center px-4"
        style="background: rgba(0, 0, 0, 0.8)"
      >
        <div
          class="rounded-xl p-8 text-center max-w-sm w-full"
          style="background: #1b2838; border: 2px solid #d7ff00"
        >
          <div id="modal-badge" class="text-5xl mb-4"></div>
          <h2
            id="modal-team"
            class="text-2xl font-bold mb-2"
            style="color: #d7ff00; font-family: &quot;Oswald&quot;, sans-serif"
          ></h2>
          <p class="mb-6" style="color: #8899aa">
            Você agora é o novo treinador!
          </p>
          <button
            onclick="window.location.href = './pages/teamChoce.html'"
            class="px-6 py-2 rounded-lg font-semibold"
            style="background: #d7ff00; color: #0d1b2a"
          >
            COMEÇAR
          </button>
        </div>
      </div>
    </div>

    <script src="./js/index.js"></script>
  </body>
</html>
